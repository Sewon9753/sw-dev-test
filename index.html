<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조세원 | CEO · HOFN</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 UMD -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel (JSX transform) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root { --gold: #C9A84C; --gold-light: #EDD98A; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #080808;
      color: #fff;
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    ::selection { background: rgba(201,168,76,.3); }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

    /* ── Gold text ── */
    .gold-text {
      background: linear-gradient(135deg, #C9A84C 0%, #EDD98A 50%, #C9A84C 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,.35), transparent);
    }

    /* ── Section fade-in animation ── */
    .reveal {
      opacity: 0;
      transform: translateY(48px);
      transition: opacity .9s cubic-bezier(.22,1,.36,1), transform .9s cubic-bezier(.22,1,.36,1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    .reveal-left {
      opacity: 0;
      transform: translateX(-48px);
      transition: opacity .8s cubic-bezier(.22,1,.36,1), transform .8s cubic-bezier(.22,1,.36,1);
    }
    .reveal-left.visible { opacity: 1; transform: translateX(0); }

    .reveal-right {
      opacity: 0;
      transform: translateX(48px);
      transition: opacity .8s cubic-bezier(.22,1,.36,1), transform .8s cubic-bezier(.22,1,.36,1);
    }
    .reveal-right.visible { opacity: 1; transform: translateX(0); }

    /* ── Hero background ── */
    .hero-bg {
      background:
        radial-gradient(ellipse 80% 55% at 50% 0%, rgba(201,168,76,.09) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 85% 80%, rgba(201,168,76,.05) 0%, transparent 60%),
        #080808;
    }

    /* ── Rings ── */
    .ring {
      border: 1px solid rgba(201,168,76,.18);
      border-radius: 50%;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: ring-pulse 4s ease-in-out infinite;
    }
    @keyframes ring-pulse {
      0%,100% { opacity: .15; }
      50%      { opacity: .4; }
    }

    /* ── Scroll arrow ── */
    .scroll-arrow {
      animation: arrow-bounce 2s ease-in-out infinite;
    }
    @keyframes arrow-bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(10px); }
    }

    /* ── Nav blur ── */
    .nav-glass {
      background: rgba(8,8,8,.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    /* ── Cards ── */
    .glass-card {
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.02);
      border-radius: 16px;
      transition: border-color .35s, background .35s;
    }
    .glass-card:hover {
      border-color: rgba(201,168,76,.3);
      background: rgba(201,168,76,.04);
    }

    .core-card {
      border: 1px solid rgba(201,168,76,.15);
      background: linear-gradient(135deg, rgba(201,168,76,.05), rgba(255,255,255,.02));
      border-radius: 16px;
      transition: all .35s;
    }
    .core-card:hover {
      border-color: rgba(201,168,76,.5);
      background: linear-gradient(135deg, rgba(201,168,76,.1), rgba(255,255,255,.04));
      transform: translateY(-6px);
      box-shadow: 0 24px 48px rgba(0,0,0,.4), 0 0 24px rgba(201,168,76,.1);
    }

    .portfolio-card {
      border: 1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.015);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      transition: all .4s;
    }
    .portfolio-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(201,168,76,.06) 0%, transparent 55%);
      opacity: 0;
      transition: opacity .4s;
    }
    .portfolio-card:hover::before { opacity: 1; }
    .portfolio-card:hover {
      border-color: rgba(201,168,76,.25);
      transform: translateY(-8px);
      box-shadow: 0 32px 64px rgba(0,0,0,.5);
    }

    /* ── Timeline dot ── */
    .t-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 14px rgba(201,168,76,.7);
      flex-shrink: 0;
    }

    /* ── Tag ── */
    .gold-tag {
      font-size: .65rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(201,168,76,.3);
      padding: .25rem .75rem;
      border-radius: 99px;
    }

    /* ── Market tag hover ── */
    .market-tag {
      font-size: .85rem;
      font-weight: 300;
      color: rgba(255,255,255,.55);
      border: 1px solid rgba(201,168,76,.22);
      padding: .6rem 1.5rem;
      border-radius: 99px;
      transition: all .3s;
      cursor: default;
    }
    .market-tag:hover {
      color: #fff;
      border-color: rgba(201,168,76,.65);
      background: rgba(201,168,76,.06);
    }

    /* ── Fade-in hero ── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-anim-1 { animation: fade-up .9s cubic-bezier(.22,1,.36,1) .3s both; }
    .hero-anim-2 { animation: fade-up 1s  cubic-bezier(.22,1,.36,1) .55s both; }
    .hero-anim-3 { animation: fade-up .9s cubic-bezier(.22,1,.36,1) .85s both; }
    .hero-anim-4 { animation: fade-up .9s cubic-bezier(.22,1,.36,1) 1.1s both; }
    .hero-anim-5 { animation: fade-up .8s cubic-bezier(.22,1,.36,1) 1.5s both; }

    @keyframes nav-in {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .nav-anim { animation: nav-in .8s cubic-bezier(.22,1,.36,1) .2s both; }

    /* ── Responsive ── */
    @media (max-width: 767px) {
      .hide-md { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ─── Data ───────────────────────────────────────────── */
    const DATA = {
      hero: {
        name: "조세원",
        brand: "HOFN",
        company: "파인핸스",
        vision: "AI 기반 개인 맞춤형 스킨케어 플랫폼 및\n스마트 뷰티 디바이스를 통한 글로벌 뷰티 테크 선도"
      },
      profile: {
        birth: "1979.02.04",
        education: ["단국대학교 영어학과", "Radisson Hotel 미국 인턴십"]
      },
      career: [
        { year: "2013", company: "제이비알",            role: "대표이사",     desc: "IT / SW / HW 사업 기반 구축" },
        { year: "2015", company: "제이비알아이엔티",    role: "대표이사",     desc: "국내외 유통 네트워크 확장" },
        { year: "2018", company: "제이와이앤인터내셔널", role: "대표이사",    desc: "글로벌 비즈니스 플랫폼 개발" },
        { year: "2019", company: "룩스앤메이코스메틱",  role: "글로벌 본부장", desc: "K-뷰티 해외 유통 총괄" },
        { year: "2024", company: "파인핸스",            role: "대표이사",     desc: "AI 뷰티 테크 스타트업 창업" }
      ],
      core: [
        { num: "01", label: "IT · SW · HW",  desc: "통합 기술 사업 운영" },
        { num: "02", label: "뷰티 & 코스메틱", desc: "화장품 산업 심층 경험" },
        { num: "03", label: "EV 충전 인프라", desc: "전기차 충전 인프라 사업" },
        { num: "04", label: "글로벌 유통",    desc: "해외 유통 네트워크" },
        { num: "05", label: "시장 확장",      desc: "신시장 개척 성과" },
        { num: "06", label: "플랫폼 사업화",  desc: "디지털 플랫폼 구축" }
      ],
      portfolio: [
        { company: "제이비알 · 제이비알아이엔티", period: "2013 — 2017", cat: "IT · 유통",
          desc: "IT, SW, HW 기반 사업 운영 및 국내외 유통 네트워크 확립. 초기 시장 진입 전략 수립 및 성장 견인." },
        { company: "제이와이앤인터내셔널", period: "2018 — 2019", cat: "글로벌 비즈니스",
          desc: "글로벌 비즈니스 플랫폼 개발 및 해외 파트너십 구축. 다국적 시장 확장 전략 실행." },
        { company: "룩스앤메이코스메틱", period: "2019 — 2023", cat: "뷰티 · 글로벌",
          desc: "뷰티 산업 글로벌 본부 총괄. K-뷰티 해외 유통 전략 기획 및 브랜드 글로벌화 리드." },
        { company: "파인핸스 · HOFN", period: "2024 — Present", cat: "AI · 뷰티 테크",
          desc: "AI 맞춤형 스킨케어 플랫폼과 스마트 뷰티 디바이스 개발. 글로벌 뷰티 테크 시장 선도." }
      ],
      markets: ["한국", "미국", "일본", "중국", "동남아시아", "유럽"]
    };

    /* ─── Hooks ──────────────────────────────────────────── */
    function useScrolled(threshold = 60) {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > threshold);
        window.addEventListener('scroll', fn, { passive: true });
        return () => window.removeEventListener('scroll', fn);
      }, [threshold]);
      return scrolled;
    }

    // Attach IntersectionObserver to a ref; adds 'visible' class
    function useReveal(delay = 0) {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        el.style.transitionDelay = `${delay}s`;
        const obs = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) { el.classList.add('visible'); obs.disconnect(); } },
          { threshold: 0.12, rootMargin: '-60px' }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, [delay]);
      return ref;
    }

    /* ─── Shared ─────────────────────────────────────────── */
    const SectionLabel = ({ children }) => (
      <p style={{ color: 'var(--gold)', letterSpacing: '.35em', fontSize: '.7rem' }}
         className="uppercase mb-4 font-light">
        {children}
      </p>
    );

    /* ─── Nav ────────────────────────────────────────────── */
    function Nav() {
      const scrolled = useScrolled();
      const [open, setOpen] = useState(false);
      const links = ['about','career','core','portfolio','global'];
      return (
        <>
          <nav className={`nav-anim fixed top-0 left-0 right-0 z-50 px-6 md:px-12 py-5 flex justify-between items-center transition-all duration-500 ${scrolled ? 'nav-glass' : ''}`}>
            <a href="#hero" className="gold-text font-light" style={{ letterSpacing: '.5em', fontSize: '.8rem' }}>HOFN</a>
            <div className="hide-md flex gap-10">
              {links.map(l => (
                <a key={l} href={`#${l}`}
                   className="text-white/40 hover:text-white transition-colors duration-300"
                   style={{ fontSize: '.7rem', letterSpacing: '.25em', textTransform: 'uppercase' }}>
                  {l}
                </a>
              ))}
            </div>
            <button className="md:hidden text-white/60 hover:text-white" onClick={() => setOpen(v => !v)}>
              <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                {open
                  ? <path d="M4 4l14 14M18 4L4 18" stroke="currentColor" strokeWidth="1.5"/>
                  : <>
                      <line x1="3" y1="6"  x2="19" y2="6"  stroke="currentColor" strokeWidth="1.5"/>
                      <line x1="3" y1="11" x2="19" y2="11" stroke="currentColor" strokeWidth="1.5"/>
                      <line x1="3" y1="16" x2="19" y2="16" stroke="currentColor" strokeWidth="1.5"/>
                    </>
                }
              </svg>
            </button>
          </nav>

          {open && (
            <div className="nav-glass fixed inset-0 z-40 flex flex-col justify-center items-center gap-10">
              {links.map(l => (
                <a key={l} href={`#${l}`} onClick={() => setOpen(false)}
                   className="text-white text-2xl tracking-widest uppercase font-light">
                  {l}
                </a>
              ))}
            </div>
          )}
        </>
      );
    }

    /* ─── Hero ───────────────────────────────────────────── */
    function Hero() {
      return (
        <section id="hero" className="hero-bg relative min-h-screen flex flex-col justify-center items-center overflow-hidden px-6" style={{ paddingTop: '80px' }}>
          {/* Rings */}
          {[500, 750, 1050].map((s, i) => (
            <div key={s} className="ring" style={{ width: s, height: s, animationDelay: `${i}s` }} />
          ))}

          <div className="relative z-10 text-center max-w-4xl mx-auto">
            <p className="hero-anim-1" style={{ color: 'var(--gold)', letterSpacing: '.55em', fontSize: '.7rem', textTransform: 'uppercase' }}>
              HOFN · 파인핸스
            </p>

            <h1 className="hero-anim-2 font-extralight" style={{ fontSize: 'clamp(3.5rem,12vw,9rem)', letterSpacing: '-.02em', lineHeight: 1, marginTop: '1.5rem' }}>
              조세원
            </h1>

            <div className="hero-anim-3 flex items-center justify-center gap-4" style={{ marginTop: '1.5rem', marginBottom: '3rem' }}>
              <div className="divider" style={{ width: '3rem' }} />
              <span className="text-white/35 font-light" style={{ fontSize: '.75rem', letterSpacing: '.4em', textTransform: 'uppercase' }}>Chief Executive Officer</span>
              <div className="divider" style={{ width: '3rem' }} />
            </div>

            <p className="hero-anim-4 text-white/35 font-light leading-relaxed" style={{ fontSize: 'clamp(.9rem,1.2vw,1.15rem)', whiteSpace: 'pre-line', maxWidth: '500px', margin: '0 auto' }}>
              {DATA.hero.vision}
            </p>
          </div>

          <div className="hero-anim-5 absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2">
            <span className="text-white/20" style={{ fontSize: '.6rem', letterSpacing: '.4em' }}>SCROLL</span>
            <div className="scroll-arrow" style={{ width: '1px', height: '2.5rem', background: 'linear-gradient(to bottom, rgba(201,168,76,.6), transparent)' }} />
          </div>
        </section>
      );
    }

    /* ─── About ──────────────────────────────────────────── */
    function About() {
      const r1 = useReveal(0);
      const r2 = useReveal(.15);
      const r3 = useReveal(.3);
      return (
        <section id="about" className="py-32 px-6 md:px-16 lg:px-32" style={{ maxWidth: '1200px', margin: '0 auto' }}>
          <div ref={r1} className="reveal mb-20">
            <SectionLabel>About</SectionLabel>
            <h2 className="font-extralight" style={{ fontSize: 'clamp(2rem,5vw,3.5rem)', letterSpacing: '-.02em', lineHeight: 1.2 }}>
              뷰티 테크를 이끄는<br/>
              <span className="gold-text">리더십의 궤적</span>
            </h2>
          </div>

          <div className="grid md:grid-cols-2 gap-12 items-start">
            <div ref={r2} className="reveal glass-card p-10">
              <SectionLabel>Profile</SectionLabel>
              <div className="space-y-6 mt-4">
                {[
                  { label: '생년월일', value: DATA.profile.birth },
                ].map(({ label, value }) => (
                  <div key={label}>
                    <p className="text-white/30 mb-1" style={{ fontSize: '.65rem', letterSpacing: '.3em', textTransform: 'uppercase' }}>{label}</p>
                    <p className="text-white/80 font-light text-lg">{value}</p>
                  </div>
                ))}
                <div className="divider" />
                <div>
                  <p className="text-white/30 mb-3" style={{ fontSize: '.65rem', letterSpacing: '.3em', textTransform: 'uppercase' }}>학력</p>
                  {DATA.profile.education.map((e, i) => (
                    <p key={i} className="text-white/75 font-light py-1.5">{e}</p>
                  ))}
                </div>
                <div className="divider" />
                <div>
                  <p className="text-white/30 mb-2" style={{ fontSize: '.65rem', letterSpacing: '.3em', textTransform: 'uppercase' }}>현재 직책</p>
                  <p className="text-white/80 font-light text-lg">
                    <span className="gold-text">CEO</span> · 파인핸스 / HOFN
                  </p>
                </div>
              </div>
            </div>

            <div ref={r3} className="reveal">
              <blockquote className="font-extralight leading-relaxed mb-10" style={{ fontSize: 'clamp(1.2rem,2.5vw,1.8rem)', letterSpacing: '-.01em' }}>
                "기술과 뷰티의 교차점에서<br/>
                <span className="gold-text">새로운 가능성</span>을 발견합니다."
              </blockquote>
              <div className="divider mb-10" />
              <p className="text-white/30 mb-6" style={{ fontSize: '.65rem', letterSpacing: '.3em', textTransform: 'uppercase' }}>Key Highlights</p>
              <div className="space-y-5">
                {[
                  { num: '10+', label: '년 글로벌 비즈니스 경험' },
                  { num: '5+',  label: '개 기업 경영 이력' },
                  { num: '多',  label: '국가 유통 네트워크 구축' }
                ].map(({ num, label }) => (
                  <div key={num} className="flex items-center gap-6">
                    <span className="gold-text font-extralight" style={{ fontSize: '2rem', width: '4rem', textAlign: 'right' }}>{num}</span>
                    <span className="text-white/45 font-light">{label}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ─── Career ─────────────────────────────────────────── */
    function CareerItem({ item, index }) {
      const isEven = index % 2 === 0;
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        el.style.transitionDelay = `${index * .1}s`;
        const obs = new IntersectionObserver(
          ([e]) => { if (e.isIntersecting) { el.classList.add('visible'); obs.disconnect(); } },
          { threshold: .12, rootMargin: '-60px' }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, [index]);

      const Card = () => (
        <div className="glass-card p-6 inline-block text-left" style={{ maxWidth: '280px' }}>
          <p className="gold-text font-extralight mb-1" style={{ fontSize: '1.6rem' }}>{item.year}</p>
          <p className="text-white font-light text-base mb-1">{item.company}</p>
          <p className="text-white/40 mb-2" style={{ fontSize: '.65rem', letterSpacing: '.3em', textTransform: 'uppercase' }}>{item.role}</p>
          <p className="text-white/30 text-sm">{item.desc}</p>
        </div>
      );

      return (
        <div ref={ref} className={`${isEven ? 'reveal-left' : 'reveal-right'}`}>
          {/* Desktop: alternating */}
          <div className="hidden md:grid items-center" style={{ gridTemplateColumns: '1fr 2rem 1fr', gap: '1.5rem' }}>
            <div className="flex justify-end">{isEven ? <Card /> : null}</div>
            <div className="flex justify-center"><div className="t-dot" /></div>
            <div>{!isEven ? <Card /> : null}</div>
          </div>
          {/* Mobile: single column */}
          <div className="flex md:hidden items-start gap-5">
            <div className="flex flex-col items-center pt-1">
              <div className="t-dot" />
              {index < DATA.career.length - 1 && <div style={{ width: '1px', flex: 1, minHeight: '60px', background: 'rgba(201,168,76,.3)', marginTop: '8px' }} />}
            </div>
            <Card />
          </div>
        </div>
      );
    }

    function Career() {
      const title = useReveal(0);
      return (
        <section id="career" className="py-32 px-6 md:px-16 lg:px-32">
          <div style={{ maxWidth: '900px', margin: '0 auto' }}>
            <div ref={title} className="reveal mb-20">
              <SectionLabel>Career Timeline</SectionLabel>
              <h2 className="font-extralight" style={{ fontSize: 'clamp(2rem,5vw,3.5rem)', letterSpacing: '-.02em' }}>
                경력의 <span className="gold-text">이정표</span>
              </h2>
            </div>

            {/* Desktop timeline line */}
            <div className="relative">
              <div className="hidden md:block absolute top-0 bottom-0 left-1/2 -translate-x-1/2"
                   style={{ width: '1px', background: 'linear-gradient(to bottom, transparent, rgba(201,168,76,.4), rgba(201,168,76,.5), rgba(201,168,76,.4), transparent)' }} />
              <div className="space-y-10">
                {DATA.career.map((item, i) => <CareerItem key={item.year} item={item} index={i} />)}
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ─── Core ───────────────────────────────────────────── */
    function Core() {
      const title = useReveal(0);
      return (
        <section id="core" className="py-32 px-6 md:px-16 lg:px-32">
          <div className="divider mb-24" />
          <div style={{ maxWidth: '1200px', margin: '0 auto' }}>
            <div ref={title} className="reveal mb-16">
              <SectionLabel>Core Competencies</SectionLabel>
              <h2 className="font-extralight" style={{ fontSize: 'clamp(2rem,5vw,3.5rem)', letterSpacing: '-.02em' }}>
                핵심 <span className="gold-text">역량</span>
              </h2>
            </div>

            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
              {DATA.core.map((item, i) => {
                const ref = useReveal(i * .08);
                return (
                  <div key={item.num} ref={ref} className="reveal core-card p-8">
                    <div className="gold-text font-extralight mb-4" style={{ fontSize: '1.5rem' }}>{item.num}</div>
                    <p className="text-white font-light text-lg mb-2">{item.label}</p>
                    <p className="text-white/30 text-sm">{item.desc}</p>
                  </div>
                );
              })}
            </div>
          </div>
          <div className="divider mt-24" />
        </section>
      );
    }

    /* ─── Portfolio ──────────────────────────────────────── */
    function Portfolio() {
      const title = useReveal(0);
      return (
        <section id="portfolio" className="py-32 px-6 md:px-16 lg:px-32">
          <div style={{ maxWidth: '1200px', margin: '0 auto' }}>
            <div ref={title} className="reveal mb-16">
              <SectionLabel>Portfolio</SectionLabel>
              <h2 className="font-extralight" style={{ fontSize: 'clamp(2rem,5vw,3.5rem)', letterSpacing: '-.02em' }}>
                주요 <span className="gold-text">벤처</span>
              </h2>
            </div>

            <div className="grid md:grid-cols-2 gap-6">
              {DATA.portfolio.map((item, i) => {
                const ref = useReveal(i * .12);
                return (
                  <div key={item.company} ref={ref} className="reveal portfolio-card p-10">
                    <div className="flex justify-between items-start mb-8">
                      <span className="gold-tag">{item.cat}</span>
                      <span className="text-white/25 font-light" style={{ fontSize: '.75rem' }}>{item.period}</span>
                    </div>
                    <h3 className="text-white font-light text-xl mb-4" style={{ letterSpacing: '-.01em' }}>{item.company}</h3>
                    <p className="text-white/40 text-sm leading-relaxed">{item.desc}</p>
                    <div className="mt-8 pt-6" style={{ borderTop: '1px solid rgba(255,255,255,.05)' }}>
                      <span className="text-white/20" style={{ fontSize: '.65rem', letterSpacing: '.3em' }}>
                        VENTURE {i + 1} / {DATA.portfolio.length}
                      </span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </section>
      );
    }

    /* ─── Global ─────────────────────────────────────────── */
    function Global() {
      const r1 = useReveal(0);
      const r2 = useReveal(.2);
      const r3 = useReveal(.4);
      return (
        <section id="global" className="py-32 px-6 md:px-16 lg:px-32">
          <div className="divider mb-24" />
          <div style={{ maxWidth: '1200px', margin: '0 auto' }}>
            <div ref={r1} className="reveal mb-8">
              <SectionLabel>Global Vision</SectionLabel>
              <h2 className="font-extralight" style={{ fontSize: 'clamp(2rem,5vw,3.5rem)', letterSpacing: '-.02em' }}>
                <span className="gold-text">글로벌</span> 시장으로
              </h2>
            </div>

            <p className="text-white/35 font-light leading-relaxed mb-20" style={{ fontSize: 'clamp(.9rem,1.1vw,1.1rem)', maxWidth: '640px' }}>
              HOFN은 AI와 스마트 디바이스의 결합으로 국경 없는 개인 맞춤형 뷰티 경험을 전 세계에 제공합니다.
            </p>

            <div ref={r2} className="reveal flex flex-wrap gap-3 mb-20">
              {DATA.markets.map(m => <span key={m} className="market-tag">{m}</span>)}
            </div>

            <div ref={r3} className="reveal rounded-3xl text-center py-16 px-8"
                 style={{ border: '1px solid rgba(201,168,76,.12)', background: 'radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,.07) 0%, transparent 70%)' }}>
              <p className="font-extralight leading-relaxed" style={{ fontSize: 'clamp(1.2rem,3vw,2.2rem)', letterSpacing: '-.02em' }}>
                "아름다움의 미래는<br/>
                <span className="gold-text">개인화된 AI 경험</span>에 있습니다."
              </p>
              <p className="text-white/25 mt-6" style={{ fontSize: '.8rem', letterSpacing: '.2em' }}>— 조세원, CEO HOFN</p>
            </div>
          </div>
        </section>
      );
    }

    /* ─── Footer ─────────────────────────────────────────── */
    function Footer() {
      return (
        <footer className="py-16 px-6 md:px-16 lg:px-32">
          <div className="divider mb-16" />
          <div className="flex flex-col md:flex-row justify-between items-center gap-8" style={{ maxWidth: '1200px', margin: '0 auto' }}>
            <div>
              <p className="gold-text font-light mb-1" style={{ fontSize: '1.1rem', letterSpacing: '.4em' }}>HOFN</p>
              <p className="text-white/25 text-sm">파인핸스 · 조세원 CEO</p>
            </div>
            <p className="text-white/15" style={{ fontSize: '.65rem', letterSpacing: '.35em', textTransform: 'uppercase' }}>
              AI Beauty Tech · Global Platform
            </p>
            <div className="text-right">
              <p className="text-white/20 text-xs">© 2024 HOFN / 파인핸스</p>
              <p className="text-white/12 text-xs mt-1">All Rights Reserved</p>
            </div>
          </div>
        </footer>
      );
    }

    /* ─── App ────────────────────────────────────────────── */
    function App() {
      return (
        <>
          <Nav />
          <Hero />
          <About />
          <Career />
          <Core />
          <Portfolio />
          <Global />
          <Footer />
        </>
      );
    }

    /* ─── Mount ──────────────────────────────────────────── */
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
